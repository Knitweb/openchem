<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=https://chemfield.github.io/openchem/" />
  <link rel="canonical" href="https://chemfield.github.io/openchem/" />
  <title>OpenChem moved to ChemField</title>
  <style>
    :root {
      --ink: #17201c;
      --muted: #59655f;
      --line: #d9e5df;
      --field: #ebf7ef;
      --leaf: #2d8a57;
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(45, 138, 87, .13), transparent 35%),
        repeating-linear-gradient(90deg, rgba(23, 32, 28, .035) 0 1px, transparent 1px 34px),
        var(--field);
    }

    main {
      width: min(680px, 100%);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .82);
      padding: 36px;
      box-shadow: 0 22px 70px rgba(23, 32, 28, .12);
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 8vw, 68px);
      line-height: .95;
      font-weight: 500;
      letter-spacing: 0;
    }

    p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    a {
      color: var(--leaf);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>OpenChem moved to ChemField.</h1>
    <p>
      The active repository is now
      <a href="https://github.com/ChemField/openchem">github.com/ChemField/openchem</a>.
    </p>
    <p>
      The live site is
      <a href="https://chemfield.github.io/openchem/">chemfield.github.io/openchem</a>.
    </p>
  </main>
</body>
</html>
